name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.0)'
        required: true
        default: '2.0.0'

jobs:
  build-debian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build DEB package
        run: |
          cd packages/debian
          chmod +x build.sh
          ./build.sh

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v3
        with:
          name: debian-package
          path: packages/debian/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm rpmbuild

      - name: Build RPM package
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp packages/rpm/diskcleanup.spec ~/rpmbuild/SPECS/
          tar czf ~/rpmbuild/SOURCES/diskcleanup-2.0.0.tar.gz .
          rpmbuild -ba ~/rpmbuild/SPECS/diskcleanup.spec

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v3
        with:
          name: rpm-package
          path: ~/rpmbuild/RPMS/noarch/*.rpm

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget libfuse2

      - name: Build AppImage
        run: |
          cd packages/appimage
          chmod +x build-appimage.sh
          ./build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: appimage
          path: packages/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PowerShell
        uses: microsoft/setup-powershell@v1

      - name: Install PS2EXE
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Force -Scope CurrentUser

      - name: Build EXE
        shell: pwsh
        run: |
          Invoke-PS2EXE `
            -inputFile ".\cleanup.ps1" `
            -outputFile ".\DiskCleanupTool.exe" `
            -noConsole `
            -requireAdmin

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-exe
          path: DiskCleanupTool.exe

  release:
    needs: [build-debian, build-rpm, build-appimage, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            debian-package/*.deb
            rpm-package/*.rpm
            appimage/*.AppImage
            windows-exe/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
