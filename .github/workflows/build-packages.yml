name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.0.0)'
        required: true
        default: '3.0.0'

jobs:
  build-homebrew:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          brew install pwsh

      - name: Create Homebrew formula
        run: |
          cp diskcleanup.rb diskcleanup-formula.rb

      - name: Upload Homebrew formula
        uses: actions/upload-artifact@v3
        with:
          name: homebrew-formula
          path: diskcleanup-formula.rb

  build-debian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build DEB package
        run: |
          cd packages/debian
          chmod +x build.sh
          ./build.sh

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v3
        with:
          name: debian-package
          path: packages/debian/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm rpmbuild

      - name: Build RPM package
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp packages/rpm/diskcleanup.spec ~/rpmbuild/SPECS/
          tar czf ~/rpmbuild/SOURCES/diskcleanup-3.0.0.tar.gz .
          rpmbuild -ba ~/rpmbuild/SPECS/diskcleanup.spec

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v3
        with:
          name: rpm-package
          path: ~/rpmbuild/RPMS/noarch/*.rpm

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget libfuse2

      - name: Build AppImage
        run: |
          cd packages/appimage
          chmod +x build-appimage.sh
          ./build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: appimage
          path: packages/appimage/*.AppImage

  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Snap
        uses: snapcore/action-build@v1
        with:
          path: snapcraft.yaml

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v3
        with:
          name: snap-package
          path: "*.snap"

  release:
    needs: [build-homebrew, build-debian, build-rpm, build-appimage, build-snap]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            debian-package/*.deb
            rpm-package/*.rpm
            appimage/*.AppImage
            snap-package/*.snap
            homebrew-formula/*.rb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
